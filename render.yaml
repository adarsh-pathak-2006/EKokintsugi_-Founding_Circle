services:
  - type: web
    name: ekokintsugi-pilot
    env: python
    buildCommand: bash build.sh
    startCommand: gunicorn config.wsgi:application
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: SQLITE_PATH
        value: /var/data/db.sqlite3
      - key: MEDIA_ROOT
        value: /var/data/media
    disk:
      name: ekokintsugi-data
      mountPath: /var/data
      sizeGB: 1
